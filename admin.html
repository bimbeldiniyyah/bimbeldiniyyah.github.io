<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Kelola Data</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f4f7f6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #2c3e50; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #28a745; color: white; width: 100%; margin-bottom: 5px; }
        .btn-edit { background: #ffc107; color: #212529; font-size: 11px; margin-right: 5px; }
        .btn-del { background: #dc3545; color: white; font-size: 11px; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .ni-badge { font-size: 11px; background: #e9ecef; padding: 2px 6px; border-radius: 4px; color: #495057; margin-right: 8px; }
        .type-badge { font-size: 10px; color: #666; font-style: italic; margin-left: 5px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #loading-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="loading-gate">Mengecek Hak Akses Admin...</div>

    <div class="nav">
        <button onclick="window.location.href='index.html'" style="background:#6c757d; color:white;">← Kembali ke Input Nilai</button>
        <button onclick="prosesLogout()" style="background:#dc3545; color:white;">Logout</button>
    </div>

    <h1>⚙️ Panel Admin - Kelola Identitas</h1>

    <div class="grid">
        <!-- 1. KELOLA KELAS -->
        <div class="card">
            <h2>1. Daftar Kelas</h2>
            <div class="input-group">
                <input type="text" id="inputKelas" placeholder="Nama Kelas Baru (Cth: 7A)...">
                <button class="btn-add" id="btnTambahKelas" onclick="tambahKelas()">Tambah Kelas</button>
            </div>
            <ul id="listKelas"><li>Memuat data kelas...</li></ul>
        </div>

        <!-- 2. KELOLA MURID -->
        <div class="card">
            <h2>2. Daftar Murid</h2>
            <div class="input-group">
                <input type="text" id="niMurid" placeholder="Nomor Induk (NI)...">
                <input type="text" id="namaMurid" placeholder="Nama Murid Baru...">
                <select id="pilihKelasMurid">
                    <option value="">-- Pilih Kelas Murid --</option>
                </select>
                <button class="btn-add" id="btnTambahMurid" onclick="tambahMurid()">Tambah Murid</button>
            </div>
            <ul id="listMurid"><li>Memuat data murid...</li></ul>
        </div>

        <!-- 3. KELOLA MATERI -->
        <div class="card">
            <h2>3. Daftar Materi</h2>
            <p style="font-size: 11px; color: #666;">Materi yang ditambah di sini akan otomatis muncul di lembar evaluasi.</p>
            <div class="input-group">
                <input type="text" id="inputMateri" placeholder="Nama Materi (cth: hiwar)...">
                <select id="tipeMateri">
                    <option value="huruf">Tipe Penilaian: Huruf (A-E)</option>
                    <option value="angka">Tipe Penilaian: Angka (1-100)</option>
                </select>
                <button class="btn-add" id="btnTambahMateri" onclick="tambahMateri()">Tambah Materi</button>
            </div>
            <ul id="listMateri"><li>Memuat data materi...</li></ul>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vjoikcjirqjmossebkuq.supabase.co';
        const supabaseKey = 'sb_publishable_zzXyepP2HphkZHu27-LNvg_cX0DBGS1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = async function() {
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (!session) { window.location.href = "login.html"; return; }
                document.getElementById('loading-gate').style.display = 'none';
                muatData();
            } catch (e) { window.location.href = "login.html"; }
        };

        async function muatData() {
            await tampilkanKelas();
            tampilkanMurid();
            tampilkanMateri();
        }

        async function tampilkanKelas() {
            const { data } = await _supabase.from('kelas').select('*').order('nama_kelas', { ascending: true });
            const list = document.getElementById('listKelas');
            const select = document.getElementById('pilihKelasMurid');
            
            if (data) {
                list.innerHTML = data.map(k => `<li><span><b>${k.nama_kelas}</b></span><button class="btn-del" onclick="hapusData('kelas', ${k.id})">Hapus</button></li>`).join('');
                select.innerHTML = '<option value="">-- Pilih Kelas Murid --</option>' + data.map(k => `<option value="${k.nama_kelas}">${k.nama_kelas}</option>`).join('');
            }
        }

        async function tampilkanMurid() {
            const { data } = await _supabase.from('murid').select('*').order('nama_murid', { ascending: true });
            const list = document.getElementById('listMurid');
            list.innerHTML = (data && data.length > 0) ? data.map(m => `<li><span><span class="ni-badge">${m.nomor_induk}</span> <b>${m.nama_murid}</b> <small>(${m.kelas || 'N/A'})</small></span><div><button class="btn-edit" onclick="editMurid(${m.id}, '${m.nomor_induk}', '${m.nama_murid}', '${m.kelas}')">Edit</button><button class="btn-del" onclick="hapusData('murid', ${m.id})">Hapus</button></div></li>`).join('') : "Tidak ada murid.";
        }

        async function tampilkanMateri() {
            const { data } = await _supabase.from('materi').select('*').order('nama_materi', { ascending: true });
            const list = document.getElementById('listMateri');
            list.innerHTML = (data && data.length > 0) ? data.map(m => `<li><span><b>${m.nama_materi.toUpperCase()}</b> <span class="type-badge">(${m.tipe_penilaian})</span></span><div><button class="btn-edit" onclick="editMateri(${m.id}, '${m.nama_materi}', '${m.tipe_penilaian}')">Edit</button><button class="btn-del" onclick="hapusData('materi', ${m.id})">Hapus</button></div></li>`).join('') : "Tidak ada materi.";
        }

        async function tambahKelas() {
            const kls = document.getElementById('inputKelas').value.trim().toUpperCase();
            if (!kls) return alert("Isi nama kelas!");
            const { error } = await _supabase.from('kelas').insert([{ nama_kelas: kls }]);
            if (error) alert("Error: Nama kelas mungkin sudah ada."); else { muatData(); document.getElementById('inputKelas').value = ""; }
        }

        async function tambahMurid() {
            const ni = document.getElementById('niMurid').value;
            const nama = document.getElementById('namaMurid').value;
            const kls = document.getElementById('pilihKelasMurid').value;
            if (!ni || !nama || !kls) return alert("Isi NI, Nama, dan Kelas!");
            const { error } = await _supabase.from('murid').insert([{ nomor_induk: ni, nama_murid: nama, kelas: kls }]);
            if (error) alert(error.message); else { muatData(); document.getElementById('niMurid').value = ""; document.getElementById('namaMurid').value = ""; }
        }

        async function tambahMateri() {
            const materi = document.getElementById('inputMateri').value.trim().toLowerCase();
            const tipe = document.getElementById('tipeMateri').value;
            if (!materi) return alert("Isi nama materi!");
            const { error } = await _supabase.from('materi').insert([{ nama_materi: materi, tipe_penilaian: tipe }]);
            if (error) alert(error.message); else { muatData(); document.getElementById('inputMateri').value = ""; }
        }

        async function editMurid(id, niLama, namaLama, kelasLama) {
            const niBaru = prompt("Ubah NI:", niLama);
            const namaBaru = prompt("Ubah Nama:", namaLama);
            const kelasBaru = prompt("Ubah Kelas:", kelasLama);
            if (niBaru && namaBaru && kelasBaru) {
                const { error } = await _supabase.from('murid').update({ nomor_induk: niBaru, nama_murid: namaBaru, kelas: kelasBaru }).eq('id', id);
            }
        }

        async function editMateri(id, namaLama, tipeLama) {
            const namaBaru = prompt("Ubah Nama Materi:", namaLama);
            const tipeBaru = prompt("Ubah Tipe (huruf/angka):", tipeLama);
            if (namaBaru && (tipeBaru === 'huruf' || tipeBaru === 'angka')) {
                const { error } = await _supabase.from('materi').update({ nama_materi: namaBaru.toLowerCase(), tipe_penilaian: tipeBaru }).eq('id', id);
                if (error) alert(error.message); else muatData();
            }
        }

        async function hapusData(tabel, id) {
            if (confirm(`Hapus data dari tabel ${tabel}?`)) {
                const { error } = await _supabase.from(tabel).delete().eq('id', id);
                if (error) alert(error.message); else muatData();
            }
        }

        async function prosesLogout() {
            await _supabase.auth.signOut();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
