<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Kelola Data</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f4f7f6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #2c3e50; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #28a745; color: white; width: 100%; margin-bottom: 5px; }
        .btn-edit { background: #ffc107; color: #212529; font-size: 11px; margin-right: 5px; }
        .btn-del { background: #dc3545; color: white; font-size: 11px; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .ni-badge { font-size: 11px; background: #e9ecef; padding: 2px 6px; border-radius: 4px; color: #495057; margin-right: 8px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #loading-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="loading-gate">Mengecek Hak Akses Admin...</div>

    <div class="nav">
        <button onclick="window.location.href='index.html'" style="background:#6c757d; color:white;">← Kembali ke Input Nilai</button>
        <button onclick="prosesLogout()" style="background:#dc3545; color:white;">Logout</button>
    </div>

    <h1>⚙️ Panel Admin - Kelola Identitas</h1>

    <div class="grid">
        <div class="card">
            <h2>Daftar Murid</h2>
            <div class="input-group">
                <input type="text" id="niMurid" placeholder="Nomor Induk (NI)...">
                <input type="text" id="namaMurid" placeholder="Nama Murid Baru...">
                <button class="btn-add" id="btnTambahMurid" onclick="tambahMurid()">Tambah Murid</button>
            </div>
            <ul id="listMurid"><li>Memuat data murid...</li></ul>
        </div>

        <div class="card">
            <h2>Daftar Materi</h2>
            <div class="input-group">
                <input type="text" id="inputMateri" placeholder="Nama Materi (cth: hiwar)...">
                <button class="btn-add" id="btnTambahMateri" onclick="tambahMateri()">Tambah Materi</button>
            </div>
            <ul id="listMateri"><li>Memuat data materi...</li></ul>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vjoikcjirqjmossebkuq.supabase.co';
        const supabaseKey = 'sb_publishable_zzXyepP2HphkZHu27-LNvg_cX0DBGS1';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Memastikan pengecekan auth dilakukan pertama kali[cite: 4]
        window.onload = async function() {
            try {
                const { data: { session }, error } = await _supabase.auth.getSession();
                
                if (error || !session) {
                    window.location.href = "login.html";
                    return;
                }
                
                document.getElementById('loading-gate').style.display = 'none';
                muatData();
            } catch (e) {
                console.error("Auth error:", e);
                window.location.href = "login.html";
            }
        };

        async function muatData() {
            tampilkanMurid();
            tampilkanMateri();
        }

        async function tampilkanMurid() {
            const { data, error } = await _supabase.from('murid').select('*').order('nama_murid', { ascending: true });
            if (error) return console.error(error);
            
            const list = document.getElementById('listMurid');
            list.innerHTML = (data && data.length > 0) ? data.map(m => `
                <li>
                    <span><span class="ni-badge">${m.nomor_induk}</span> <b>${m.nama_murid}</b></span>
                    <div>
                        <button class="btn-edit" onclick="editMurid(${m.id}, '${m.nomor_induk}', '${m.nama_murid}')">Edit</button>
                        <button class="btn-del" onclick="hapusData('murid', ${m.id})">Hapus</button>
                    </div>
                </li>`).join('') : "Tidak ada murid.";
        }

        async function tampilkanMateri() {
            const { data, error } = await _supabase.from('materi').select('*').order('nama_materi', { ascending: true });
            if (error) return console.error(error);
            
            const list = document.getElementById('listMateri');
            list.innerHTML = (data && data.length > 0) ? data.map(m => `
                <li>
                    <span>${m.nama_materi.toUpperCase()}</span>
                    <div>
                        <button class="btn-edit" onclick="editMateri(${m.id}, '${m.nama_materi}')">Edit</button>
                        <button class="btn-del" onclick="hapusData('materi', ${m.id})">Hapus</button>
                    </div>
                </li>`).join('') : "Tidak ada materi.";
        }

        async function editMurid(id, niLama, namaLama) {
            const niBaru = prompt("Ubah Nomor Induk:", niLama);
            const namaBaru = prompt("Ubah Nama Murid:", namaLama);
            if (niBaru && namaBaru) {
                const { error } = await _supabase.from('murid').update({ nomor_induk: niBaru, nama_murid: namaBaru }).eq('id', id);
                if (error) alert("Gagal update: " + error.message);
                else muatData();
            }
        }

        async function editMateri(id, namaLama) {
            const namaBaru = prompt("Ubah Nama Materi:", namaLama);
            if (namaBaru) {
                const { error } = await _supabase.from('materi').update({ nama_materi: namaBaru.toLowerCase() }).eq('id', id);
                if (error) alert("Gagal update: " + error.message);
                else muatData();
            }
        }

        async function tambahMurid() {
            const ni = document.getElementById('niMurid').value;
            const nama = document.getElementById('namaMurid').value;
            if (!ni || !nama) return alert("NI dan Nama wajib diisi!");
            
            const btn = document.getElementById('btnTambahMurid');
            btn.disabled = true;
            
            const { error } = await _supabase.from('murid').insert([{ nomor_induk: ni, nama_murid: nama }]);
            btn.disabled = false;
            
            if (error) alert(error.message);
            else { muatData(); document.getElementById('niMurid').value = ""; document.getElementById('namaMurid').value = ""; }
        }

        async function tambahMateri() {
            const materi = document.getElementById('inputMateri').value;
            if (!materi) return alert("Isi nama materi!");
            
            const btn = document.getElementById('btnTambahMateri');
            btn.disabled = true;
            
            const { error } = await _supabase.from('materi').insert([{ nama_materi: materi.toLowerCase() }]);
            btn.disabled = false;
            
            if (error) alert(error.message);
            else { muatData(); document.getElementById('inputMateri').value = ""; }
        }

        async function hapusData(tabel, id) {
            if (!confirm("Hapus data ini?")) return;
            const { error } = await _supabase.from(tabel).delete().eq('id', id);
            if (error) alert(error.message);
            else muatData();
        }

        async function prosesLogout() {
            if (confirm("Keluar dari Panel Admin?")) {
                await _supabase.auth.signOut();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
