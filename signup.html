<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Guru</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 20px; 
            background: linear-gradient(rgba(240, 242, 245, 0.85), rgba(240, 242, 245, 0.85)), 
                        url('https://i.postimg.cc/BZc2W6T6/Chat-GPT-Image-Jul-16-2026-01-12-18-AM.png') no-repeat center center fixed;
            background-size: cover;
        }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align:center;">📝 Daftar Akun Guru</h2>
        <input type="email" id="email" placeholder="Email Baru">
        <input type="password" id="password" placeholder="Buat Password">
        <hr>
        <p style="font-size: 11px; color: red;">*Hanya untuk Guru yang memiliki kode aktivasi.</p>
        <input type="text" id="kodeAktivasi" placeholder="Kode Rahasia Guru">
        <button id="btnSignup" onclick="prosesSignup()">Daftar Sekarang</button>
        <p style="text-align:center; font-size: 13px;">Sudah punya akun? <a href="login.html">Login</a></p>
    </div>

<script>
    const supabaseUrl = 'https://vjoikcjirqjmossebkuq.supabase.co';
    const supabaseKey = 'sb_publishable_zzXyepP2HphkZHu27-LNvg_cX0DBGS1';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Ganti ini dengan kode rahasia pilihanmu
    const KODE_RAHASIA_VALID = "DiniyyahMulia2026"; 

    async function prosesSignup() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const kode = document.getElementById('kodeAktivasi').value;
        const btn = document.getElementById('btnSignup');

        if (!email || !password || !kode) return alert("Semua kolom harus diisi!");

        // Validasi kode sebelum mendaftar ke Supabase
        if (kode !== KODE_RAHASIA_VALID) {
            return alert("Kode Aktivasi Salah! Anda tidak diizinkan mendaftar.");
        }

        btn.disabled = true;
        btn.innerText = "Mendaftarkan...";

        // Fungsi Signup Resmi Supabase[cite: 1, 4]
        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            alert("Gagal Daftar: " + error.message);
            btn.disabled = false;
            btn.innerText = "Daftar Sekarang";
        } else {
            alert("Pendaftaran Berhasil! langsung login.");
            window.location.href = "login.html"; 
        }
    }
</script>
</body>
</html>
