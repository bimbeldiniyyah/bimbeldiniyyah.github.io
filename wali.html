<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Nilai Santriwati - Wali Murid</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; }
        
        .search-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center;
            margin-bottom: 25px;
        }

        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 13px; font-weight: bold; color: #555; margin-left: 5px; }
        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box;
            transition: 0.3s;
            margin-top: 5px;
        }
        input:focus { border-color: #007bff; outline: none; }

        button { 
            width: 100%; 
            background: #007bff; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #0056b3; }

        .hasil-box { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            display: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        .info-santri { 
            border-left: 4px solid #007bff; 
            padding-left: 15px; 
            margin-bottom: 20px; 
            text-align: left;
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8f9fa; color: #7f8c8d; padding: 12px; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; text-align: center; font-size: 14px; }
        
        .skor { font-weight: bold; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
        .btn-print { background: #28a745; margin-top: 20px; }

        @media print {
            .search-card, .btn-print { display: none; }
            body { background: white; padding: 0; }
            .hasil-box { display: block !important; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-card">
            <h2>🔍 Portal Wali Murid</h2>
            <p>Masukkan data berikut untuk melihat rekapitulasi nilai ananda.</p>
            
            <div class="input-group">
                <label>Nomor Induk (NI)</label>
                <input type="text" id="niInput" placeholder="Contoh: 2026001">
            </div>

            <div class="input-group">
                <label>Nama Lengkap Murid</label>
                <input type="text" id="namaInput" placeholder="Contoh: Fatimah">
            </div>

            <button id="btnCari" onclick="cariData()">Tampilkan Laporan</button>
        </div>

        <div id="hasil" class="hasil-box">
            <div class="info-santri">
                <h3 id="displayNama" style="margin: 0;">-</h3>
                <span id="displayNI" style="color: #7f8c8d; font-size: 13px;">NI: -</span>
            </div>
            
            <div id="tabelContainer"></div>
            
            <button class="btn-print" onclick="window.print()">📥 Simpan sebagai PDF / Cetak</button>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://vjoikcjirqjmossebkuq.supabase.co'; 
    const supabaseKey = 'sb_publishable_zzXyepP2HphkZHu27-LNvg_cX0DBGS1'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const listMateri = ['nahwu_shorof', 'fahmul_maqru', 'qiroah', 'hiwar'];

    async function cariData() {
        const ni = document.getElementById('niInput').value.trim();
        const nama = document.getElementById('namaInput').value.trim();
        const btn = document.getElementById('btnCari');
        const hasilBox = document.getElementById('hasil');

        // Validasi: Kedua kolom wajib diisi
        if (!ni || !nama) {
            return alert("Harap masukkan Nomor Induk DAN Nama Murid secara lengkap!");
        }

        btn.disabled = true;
        btn.innerText = "Mencari data...";

        try {
            // Pencarian wajib memenuhi kedua kriteria (NI eksak DAN Nama mirip)
            const { data, error } = await _supabase
                .from('evaluasi')
                .select('*')
                .eq('nomor_induk', ni) // Titik tumpu: Nomor Induk harus pas
                .ilike('nama', `%${nama}%`) // Nama bersifat fleksibel[cite: 5]
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                alert("Data tidak ditemukan. Pastikan NI dan Nama yang dimasukkan sudah benar.");
                hasilBox.style.display = "none";
            } else {
                tampilkanHasil(data);
            }

        } catch (err) {
            alert("Terjadi kesalahan: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Tampilkan Laporan";
        }
    }

    function tampilkanHasil(data) {
        const container = document.getElementById('tabelContainer');
        const hasilBox = document.getElementById('hasil');
        
        document.getElementById('displayNama').innerText = data[0].nama;
        document.getElementById('displayNI').innerText = "NI: " + (data[0].nomor_induk || "-");
        
        let html = '<table><thead><tr><th>Tanggal</th>';
        listMateri.forEach(m => { html += `<th>${m.replace('_', ' ').toUpperCase()}</th>`; });
        html += '</tr></thead><tbody>';

        data.forEach(row => {
            let tgl = new Date(row.created_at).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            html += `<tr><td>${tgl}</td>`;
            
            listMateri.forEach(m => {
                let skor = row[m] || "-";
                html += `<td><span class="skor">${skor}</span></td>`;
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        container.innerHTML = html;
        hasilBox.style.display = "block";
        
        // Scroll otomatis ke hasil agar wali murid langsung melihat tabel
        hasilBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
